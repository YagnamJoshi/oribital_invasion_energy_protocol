<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Invasion - Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="menu-body">
    <div class="game-wrapper">
        <div class="header">
            <h1>ORBITAL INVASION: <span>ENERGY PROTOCOL</span></h1>
        </div>
        
        <div class="menu-container">
            <div id="startScreen" class="overlay active">
                <h2>SYSTEM STANDBY</h2>
                <p class="blink">Press ANY KEY or CLICK to Initialize</p>
            </div>

            <div id="mainMenu" class="overlay">
                <h2>MAIN MENU</h2>
                <ul id="menuList">
                    <li class="selected"><a href="casual.html">Casual Mode</a></li>
                    <li><a href="levels.html">Level Based (Campaign)</a></li>
                    <li><a href="multiplayer.html">Versus Mode (2 Players)</a></li>
                    <li id="musicToggleOption">Music: ON</li>
                </ul>
                <p class="instructions">Use ARROWS to select, ENTER to confirm.</p>
            </div>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('startScreen');
        const mainMenu = document.getElementById('mainMenu');
        const menuItems = document.querySelectorAll('#menuList li:not(.disabled) a');
        
        let menuIndex = 0;
        let currentState = 'START';

        const startMusic = new Audio('assets/start_music.mp3'); 
        startMusic.loop = true;
        
        const menuMusic = new Audio('assets/menu_music.mp3');
        menuMusic.loop = true;

        window.addEventListener('DOMContentLoaded', () => {
            startMusic.play().catch(() => {
                const forcePlay = () => {
                    if (currentState === 'START') startMusic.play();
                    document.removeEventListener('keydown', forcePlay);
                    document.removeEventListener('click', forcePlay);
                };
                document.addEventListener('keydown', forcePlay);
                document.addEventListener('click', forcePlay);
            });
        });

        function transitionToMenu() {
            if (currentState === 'START') {
                currentState = 'MENU';
                startScreen.classList.remove('active');
                mainMenu.classList.add('active');
                startMusic.pause();
                startMusic.currentTime = 0;
                menuMusic.play().catch(err => console.log("Menu audio blocked:", err));
            }
        }

        document.addEventListener('click', () => {
            if (currentState === 'START') transitionToMenu();
        });

        document.addEventListener('keydown', (e) => {
            if (currentState === 'START') {
                transitionToMenu();
                return;
            }

            if (currentState === 'MENU') {
                if (e.key === 'ArrowUp' || e.key === 'w') {
                    menuIndex = (menuIndex > 0) ? menuIndex - 1 : menuItems.length - 1;
                    updateSelection();
                } else if (e.key === 'ArrowDown' || e.key === 's') {
                    menuIndex = (menuIndex < menuItems.length - 1) ? menuIndex + 1 : 0;
                    updateSelection();
                } else if (e.key === 'Enter') {
                    menuMusic.pause();
                    window.location.href = menuItems[menuIndex].href;
                }
            }
        });

        function updateSelection() {
            document.querySelectorAll('#menuList li').forEach(li => li.classList.remove('selected'));
            menuItems[menuIndex].parentElement.classList.add('selected');
        }
    </script>
</body>
</html>
