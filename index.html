<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Invasion - Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="menu-body">
    <div class="game-wrapper">
        <div class="header">
            <h1>ORBITAL INVASION: <span>ENERGY PROTOCOL</span></h1>
        </div>
        
        <div class="menu-container">
            <div id="startScreen" class="overlay active">
                <h2>SYSTEM STANDBY</h2>
                <p class="blink">Press ANY KEY to Initialize Audio & Menu</p>
            </div>

            <div id="mainMenu" class="overlay">
                <h2>MAIN MENU</h2>
                <ul id="menuList">
                    <li class="selected"><a href="casual.html">Casual Mode</a></li>
                    <li class="disabled">Level Based (Locked)</li>
                    <li class="disabled">Multiplayer (Locked)</li>
                </ul>
                <p class="instructions">Use ARROWS to select, ENTER to confirm.</p>
            </div>
        </div>
    </div>

    <script>
        let state = 'START';
        const startScreen = document.getElementById('startScreen');
        const mainMenu = document.getElementById('mainMenu');
        const menuItems = document.querySelectorAll('#menuList li:not(.disabled) a');
        let menuIndex = 0;

        // Load your menu music from the assets folder
        const menuMusic = new Audio('assets/menu_music.mp3'); 
        menuMusic.loop = true;

        document.addEventListener('keydown', (e) => {
            if (state === 'START') {
                state = 'MENU';
                startScreen.classList.remove('active');
                mainMenu.classList.add('active');
                
                // Audio is now allowed to play because the user interacted!
                menuMusic.play().catch(err => console.log("Audio still blocked:", err));
                return;
            }

            if (state === 'MENU') {
                if (e.key === 'ArrowUp' || e.key === 'w') {
                    menuIndex = (menuIndex > 0) ? menuIndex - 1 : menuItems.length - 1;
                    updateSelection();
                } else if (e.key === 'ArrowDown' || e.key === 's') {
                    menuIndex = (menuIndex < menuItems.length - 1) ? menuIndex + 1 : 0;
                    updateSelection();
                } else if (e.key === 'Enter') {
                    // Stop music before leaving page
                    menuMusic.pause(); 
                    window.location.href = menuItems[menuIndex].href;
                }
            }
        });

        function updateSelection() {
            document.querySelectorAll('#menuList li').forEach(li => li.classList.remove('selected'));
            menuItems[menuIndex].parentElement.classList.add('selected');
        }
    </script>
</body>
</html>
