<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Invasion - Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="menu-body">
    <div class="game-wrapper">
        <div class="header">
            <h1>ORBITAL INVASION: <span>ENERGY PROTOCOL</span></h1>
        </div>
        
        <div class="menu-container">
            <div id="startScreen" class="overlay active">
                <h2>SYSTEM STANDBY</h2>
                <p class="blink">Press ANY KEY or CLICK to Initialize</p>
            </div>

            <div id="mainMenu" class="overlay">
                <h2>MAIN MENU</h2>
                <ul id="menuList">
                    <li class="selected"><a href="casual.html">Casual Mode</a></li>
                    <li><a href="levels.html">Level Based (Campaign)</a></li> 
                    <li class="disabled">Multiplayer (Locked)</li>
                    <li id="musicToggleOption">Music: ON</li> 
                </ul>
                <p class="instructions">Use ARROWS to select, ENTER to confirm.</p>
            </div>
        </div>
    </div>

    <script>
        const startScreen = document.getElementById('startScreen');
        const mainMenu = document.getElementById('mainMenu');
        const menuItems = document.querySelectorAll('#menuList li:not(.disabled) a');
        const menuOptions = document.querySelectorAll('#menuList li:not(.disabled)');
        const musicToggleOption = document.getElementById('musicToggleOption');

        let menuIndex = 0;
        let currentState = 'START';

        // --- AUDIO SETUP ---
        const startMusic = new Audio('assets/start_music.mp3'); 
        startMusic.loop = true;
        
        const menuMusic = new Audio('assets/menu_music.mp3');
        menuMusic.loop = true;

        // --- MUSIC STATE ---
        let isMusicOn = true;

        // Load saved setting
        const saved = localStorage.getItem('musicEnabled');
        if (saved !== null) {
            isMusicOn = saved === 'true';
        }
        musicToggleOption.textContent = `Music: ${isMusicOn ? 'ON' : 'OFF'}`;

        function toggleMusic() {
            isMusicOn = !isMusicOn;
            musicToggleOption.textContent = `Music: ${isMusicOn ? 'ON' : 'OFF'}`;
            localStorage.setItem('musicEnabled', isMusicOn);

            if (isMusicOn) {
                if (currentState === 'START') {
                    startMusic.play();
                } else {
                    menuMusic.play();
                }
            } else {
                startMusic.pause();
                menuMusic.pause();
            }
        }

        // Click toggle
        musicToggleOption.addEventListener('click', toggleMusic);

        // --- AUTOPLAY START MUSIC ---
       window.addEventListener('DOMContentLoaded', () => {
            if (!isMusicOn) return;

            const tryPlay = () => {
                startMusic.play().catch(() => {});
            };

            // Try once
            tryPlay();

            // Force play on first interaction
            const unlockAudio = () => {
                if (currentState === 'START' && isMusicOn) {
                    startMusic.play();
                }
                document.removeEventListener('click', unlockAudio);
                document.removeEventListener('keydown', unlockAudio);
            };

            document.addEventListener('click', unlockAudio);
            document.addEventListener('keydown', unlockAudio);
        });

        // --- TRANSITION ---
        function transitionToMenu() {
            if (currentState === 'START') {
                currentState = 'MENU';
                
                startScreen.classList.remove('active');
                mainMenu.classList.add('active');
                
                startMusic.pause();
                startMusic.currentTime = 0;

                if (isMusicOn) {
                    menuMusic.play().catch(err => console.log("Menu audio blocked:", err));
                }
            }
        }

        document.addEventListener('click', () => {
            if (currentState === 'START') {
                transitionToMenu();
            }
        });

        // --- KEYBOARD NAVIGATION ---
        document.addEventListener('keydown', (e) => {

            if (currentState === 'START') {
                transitionToMenu();
                return;
            }

            if (currentState === 'MENU') {
                if (e.key === 'ArrowUp' || e.key === 'w') {
                    menuIndex = (menuIndex > 0) ? menuIndex - 1 : menuOptions.length - 1;
                    updateSelection();
                } 
                else if (e.key === 'ArrowDown' || e.key === 's') {
                    menuIndex = (menuIndex < menuOptions.length - 1) ? menuIndex + 1 : 0;
                    updateSelection();
                } 
                else if (e.key === 'Enter') {
                    const selectedItem = menuOptions[menuIndex];

                    if (selectedItem.id === 'musicToggleOption') {
                        toggleMusic();
                    } else {
                        menuMusic.pause();
                        window.location.href = selectedItem.querySelector('a').href;
                    }
                }
            }
        });

        function updateSelection() {
            document.querySelectorAll('#menuList li').forEach(li => li.classList.remove('selected'));
            menuOptions[menuIndex].classList.add('selected');
        }
    </script>
</body>
</html>
